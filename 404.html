<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Josh's Lawn Care</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1B5E20;
      --accent: #7CB342;
      --bg-light: #F1F8E9;
      --text: #1a1a1a;
      --text-muted: #4a4a4a;
      --white: #ffffff;
      --border: #d4e8c2;
      --radius-sm: 8px;
      --radius-md: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--white); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .navbar { background: var(--white); border-bottom: 3px solid var(--accent); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; max-width: 1440px; margin: 0 auto; width: 100%; }
    .nav-logo { font-family: 'Fjalla One', sans-serif; font-size: 1.3rem; color: var(--primary); text-decoration: none; }
    .nav-phone { font-weight: 700; color: var(--primary); text-decoration: none; font-size: 1rem; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px 24px; text-align: center; }
    .inner { max-width: 520px; }
    .error-code { font-family: 'Fjalla One', sans-serif; font-size: 7rem; color: var(--bg-light); line-height: 1; margin-bottom: 8px; }
    h1 { font-family: 'Fjalla One', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 16px; }
    p { font-size: 1rem; color: var(--text-muted); margin-bottom: 32px; line-height: 1.6; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .btn { display: inline-block; padding: 14px 28px; border-radius: var(--radius-sm); font-family: 'Source Sans 3', sans-serif; font-size: 1rem; font-weight: 700; text-decoration: none; min-height: 48px; cursor: pointer; border: none; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    footer { background: #0f3312; color: rgba(255,255,255,0.5); text-align: center; padding: 20px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">Josh's Lawn Care</a>
    <a href="tel:6155550100" class="nav-phone">(615) 555-0100</a>
  </nav>
  <main class="main">
    <div class="inner">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or may have moved. Head back to the homepage or give us a call — we're easy to reach.</p>
      <div class="actions">
        <a href="/" class="btn btn-primary">Back to Homepage</a>
        <a href="/#services" class="btn btn-outline">View Our Services</a>
      </div>
      <p style="margin-top:32px;"><a href="tel:6155550100" style="color:var(--primary);font-weight:700;">(615) 555-0100</a> — Call us directly</p>
    </div>
  </main>
  <footer>© 2025 Josh's Lawn Care. Nashville, TN.</footer>
</body>
</html>
